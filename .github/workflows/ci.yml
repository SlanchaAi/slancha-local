name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install libomp (macOS — needed by treelite)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install
        run: |
          uv venv .venv --python ${{ matrix.python-version }}
          uv pip install --python .venv/bin/python -e ".[dev]"

      - name: Lint
        run: |
          .venv/bin/ruff check src tests
          .venv/bin/ruff format --check src tests

      - name: Unit + integration tests
        env:
          SLANCHA_TRACES_ROOT: /tmp/slancha-test-traces
          DYLD_LIBRARY_PATH: /opt/homebrew/opt/libomp/lib
        run: .venv/bin/pytest tests/unit tests/integration -v

      - name: Adversarial regression (local classifier)
        env:
          SLANCHA_TRACES_ROOT: /tmp/slancha-test-traces
          DYLD_LIBRARY_PATH: /opt/homebrew/opt/libomp/lib
        run: .venv/bin/pytest tests/privacy -v

  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: |
          uv venv .venv --python 3.12
          uv pip install --python .venv/bin/python hatchling
          .venv/bin/python -m hatchling build
          ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl
