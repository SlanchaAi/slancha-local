name: sidecar-contract

# Three-corner schema-pin (slancha-shared schema ← slancha-mesh fixture +
# slancha-local emitter). Validates that:
#   1. the canonical fixture (slancha-mesh) conforms to the published
#      MeshUsageEvent JSON Schema (slancha-shared, PUBLIC), and
#   2. this repo's build_usage_event() output conforms to the same schema.
#
# Uses the PUBLIC slancha-shared schema instead of importing the PRIVATE
# slancha-api Pydantic: this repo is public, so it can't check out slancha-api
# with the default token (the old slancha-api checkout 404'd). slancha-api
# owns regenerating the schema; this consumes it.

on:
  pull_request:
    paths:
      - "src/slancha_local/proxy/usage_sidecar.py"
      - "src/slancha_local/proxy/mesh_auth.py"
      - "src/slancha_local/proxy/chat.py"
      - "tests/test_mesh_auth.py"
      - "tests/test_usage_sidecar.py"
      - ".github/workflows/sidecar-contract.yml"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sidecar-contract-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout slancha-local
        uses: actions/checkout@v5
        with:
          path: slancha-local

      - name: Checkout slancha-mesh (sibling for canonical fixture)
        uses: actions/checkout@v5
        with:
          repository: SlanchaAi/slancha-mesh
          path: slancha-mesh

      - name: Checkout slancha-shared (public — canonical schema)
        uses: actions/checkout@v5
        with:
          repository: SlanchaAi/slancha-shared
          ref: main
          path: slancha-shared

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install slancha-local + deps
        working-directory: slancha-local
        run: |
          pip install --upgrade pip
          pip install -e .[dev] || pip install -e .
          pip install httpx fastapi pytest pytest-asyncio jsonschema

      - name: Run sidecar tests
        working-directory: slancha-local
        env:
          SLANCHA_MESH_PATH: ${{ github.workspace }}/slancha-mesh
        run: pytest -q tests/test_mesh_auth.py tests/test_usage_sidecar.py

      - name: Assert fixture + build_usage_event conform to the published schema
        working-directory: slancha-local
        env:
          PYTHONPATH: ${{ github.workspace }}/slancha-local/src
          FIXTURE: ${{ github.workspace }}/slancha-mesh/mesh/contracts/mesh_usage_event.json
          SCHEMA: ${{ github.workspace }}/slancha-shared/schemas/mesh-usage-event.schema.json
        run: |
          python3 - <<'PY'
          import json, os
          import jsonschema
          from slancha_local.proxy.usage_sidecar import build_usage_event

          schema = json.loads(open(os.environ['SCHEMA']).read())
          fixture = json.loads(open(os.environ['FIXTURE']).read())
          fixture.pop("_meta", None)

          # Step 1: fixture conforms to the published MeshUsageEvent schema.
          jsonschema.validate(fixture, schema)

          # Step 2: build_usage_event() output conforms to the same schema.
          # Kwarg mapping (fixture field -> local function kwarg):
          #   route           -> route_target
          #   decision_reason -> decision_reason_structured
          # tokens_per_second is auto-computed; do NOT pass it.
          sample = build_usage_event(
              request_id=fixture["request_id"],
              user_id=fixture["user_id"],
              endpoint=fixture["endpoint"],
              model=fixture["model"],
              route_target=fixture["route"],
              specialist_id=fixture["specialist_id"],
              tokens_in=fixture["tokens_in"],
              tokens_out=fixture["tokens_out"],
              latency_ms=fixture["latency_ms"],
              ttft_ms=fixture["ttft_ms"],
              cost_cents=fixture["cost_cents"] or 0,
              cloud_equivalent_cost_cents=fixture["cloud_equivalent_cost_cents"],
              status_code=fixture["status_code"],
              fallback_fired=fixture.get("fallback_fired", False),
              pref_applied=fixture.get("pref_applied"),
              decision_reason_structured=fixture.get("decision_reason"),
          )
          jsonschema.validate(sample, schema)
          assert sample["request_id"] == fixture["request_id"], "request_id mismatch"
          assert sample["route"] == fixture["route"], "route mismatch"
          assert sample["model"] == fixture["model"], "model mismatch"
          print("fixture + build_usage_event conform to published MeshUsageEvent schema — contract green")
          PY
