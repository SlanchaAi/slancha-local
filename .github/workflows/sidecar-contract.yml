name: sidecar-contract

# Three-corner schema-pin (slancha-api + slancha-mesh + slancha-local).
# Adapted from paul-mac's template — same MeshUsageEvent.model_validate()
# assertion at the end, but kwarg mapping reflects this repo's actual
# build_usage_event signature (module-level function, not UsageSidecar
# method; uses route_target + decision_reason_structured kwarg names that
# differ from the fixture's route + decision_reason field names).

on:
  pull_request:
    paths:
      - "src/slancha_local/proxy/usage_sidecar.py"
      - "src/slancha_local/proxy/mesh_auth.py"
      - "src/slancha_local/proxy/chat.py"
      - "tests/test_mesh_auth.py"
      - "tests/test_usage_sidecar.py"
      - ".github/workflows/sidecar-contract.yml"
  push:
    branches: [main, feat/mesh-substrate]
  workflow_dispatch:

concurrency:
  group: sidecar-contract-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout slancha-local
        uses: actions/checkout@v5
        with:
          path: slancha-local

      - name: Checkout slancha-mesh (sibling for canonical fixture)
        uses: actions/checkout@v5
        with:
          repository: SlanchaAi/slancha-mesh
          path: slancha-mesh

      - name: Checkout slancha-api (sibling for MeshUsageEvent Pydantic)
        uses: actions/checkout@v5
        with:
          repository: SlanchaAi/slancha-api
          ref: feat/mesh-substrate
          path: slancha-api

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install slancha-local + deps
        working-directory: slancha-local
        run: |
          pip install --upgrade pip
          pip install -e .[dev] || pip install -e .
          pip install pydantic httpx fastapi pytest pytest-asyncio

      - name: Run sidecar tests
        working-directory: slancha-local
        env:
          SLANCHA_MESH_PATH: ${{ github.workspace }}/slancha-mesh
          SLANCHA_API_PATH: ${{ github.workspace }}/slancha-api
        run: pytest -q tests/test_mesh_auth.py tests/test_usage_sidecar.py

      - name: Assert build_usage_event round-trips through MeshUsageEvent
        working-directory: slancha-local
        env:
          PYTHONPATH: ${{ github.workspace }}/slancha-api:${{ github.workspace }}/slancha-local/src
          FIXTURE: ${{ github.workspace }}/slancha-mesh/mesh/contracts/mesh_usage_event.json
        run: |
          python3 - <<'PY'
          import json, os
          from app.schemas.mesh_usage import MeshUsageEvent
          from slancha_local.proxy.usage_sidecar import build_usage_event

          fixture = json.loads(open(os.environ['FIXTURE']).read())
          fixture.pop("_meta", None)

          # Step 1: fixture itself validates as MeshUsageEvent.
          MeshUsageEvent.model_validate(fixture)

          # Step 2: build_usage_event() output validates as MeshUsageEvent.
          # Kwarg mapping (fixture field -> local function kwarg):
          #   route               -> route_target
          #   decision_reason     -> decision_reason_structured
          # tokens_per_second is auto-computed; do NOT pass it.
          sample = build_usage_event(
              request_id=fixture["request_id"],
              user_id=fixture["user_id"],
              endpoint=fixture["endpoint"],
              model=fixture["model"],
              route_target=fixture["route"],
              specialist_id=fixture["specialist_id"],
              tokens_in=fixture["tokens_in"],
              tokens_out=fixture["tokens_out"],
              latency_ms=fixture["latency_ms"],
              ttft_ms=fixture["ttft_ms"],
              cost_cents=fixture["cost_cents"] or 0,
              cloud_equivalent_cost_cents=fixture["cloud_equivalent_cost_cents"],
              status_code=fixture["status_code"],
              fallback_fired=fixture.get("fallback_fired", False),
              pref_applied=fixture.get("pref_applied"),
              decision_reason_structured=fixture.get("decision_reason"),
          )
          parsed = MeshUsageEvent.model_validate(sample)
          assert parsed.request_id == fixture["request_id"], "request_id round-trip mismatch"
          assert parsed.route == fixture["route"], "route round-trip mismatch"
          assert parsed.model == fixture["model"], "model round-trip mismatch"
          print("build_usage_event round-trips through MeshUsageEvent — contract green")
          PY
