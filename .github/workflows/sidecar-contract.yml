name: sidecar-contract

# Emitter contract: this repo's build_usage_event() output must conform to the
# published MeshUsageEvent JSON Schema (slancha-shared, PUBLIC).
#
# This repo is PUBLIC, so its CI can only depend on PUBLIC repos with the
# default token. It therefore uses ONLY slancha-shared (the schema) — not the
# private slancha-api (Pydantic) nor private slancha-mesh (the fixture); both
# 404'd here before. The canonical fixture is validated against this same
# schema by slancha-mesh's own CI, so the contract is pinned end-to-end:
#   slancha-api Pydantic → (regenerate) → slancha-shared schema ← fixture (mesh)
#                                                               ← emitter (here)

on:
  pull_request:
    paths:
      - "src/slancha_local/proxy/usage_sidecar.py"
      - "src/slancha_local/proxy/mesh_auth.py"
      - "src/slancha_local/proxy/chat.py"
      - "tests/test_mesh_auth.py"
      - "tests/test_usage_sidecar.py"
      - ".github/workflows/sidecar-contract.yml"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sidecar-contract-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout slancha-local
        uses: actions/checkout@v5
        with:
          path: slancha-local

      - name: Checkout slancha-shared (public — canonical schema)
        uses: actions/checkout@v5
        with:
          repository: SlanchaAi/slancha-shared
          ref: main
          path: slancha-shared

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install slancha-local + deps
        working-directory: slancha-local
        run: |
          pip install --upgrade pip
          pip install -e .[dev] || pip install -e .
          pip install httpx fastapi pytest pytest-asyncio jsonschema

      - name: Run sidecar tests
        working-directory: slancha-local
        run: pytest -q tests/test_mesh_auth.py tests/test_usage_sidecar.py

      - name: Assert build_usage_event conforms to the published schema
        working-directory: slancha-local
        env:
          PYTHONPATH: ${{ github.workspace }}/slancha-local/src
          SCHEMA: ${{ github.workspace }}/slancha-shared/schemas/mesh-usage-event.schema.json
        run: |
          python3 - <<'PY'
          import json, os
          import jsonschema
          from slancha_local.proxy.usage_sidecar import build_usage_event

          schema = json.loads(open(os.environ['SCHEMA']).read())

          # Representative emitter input (values chosen to satisfy the schema's
          # constraints). The CANONICAL fixture lives in private slancha-mesh and
          # is validated against this same schema by slancha-mesh's own CI, so we
          # only assert the emitter side here. Kwarg mapping (wire field -> kwarg):
          #   route -> route_target ; decision_reason -> decision_reason_structured
          # tokens_per_second is auto-computed; do NOT pass it.
          sample = build_usage_event(
              request_id="00000000-0000-4000-8000-000000000001",
              user_id="00000000-0000-0000-0000-000000000aaa",
              endpoint="/v1/chat/completions",
              model="paul-voice-v8",
              route_target="mesh",
              specialist_id="paul-v8-essay-dpo-iter1-beta-0.1",
              tokens_in=230,
              tokens_out=1247,
              latency_ms=4830,
              ttft_ms=124,
              cost_cents=0,
              cloud_equivalent_cost_cents=7,
              status_code=200,
              fallback_fired=False,
              pref_applied={"quality_weight": 0.6, "max_cost_cents": 5},
              decision_reason_structured={"winner": "paul-v8-essay-dpo-iter1-beta-0.1"},
          )
          jsonschema.validate(sample, schema)
          assert sample["request_id"] == "00000000-0000-4000-8000-000000000001"
          assert sample["route"] == "mesh", "route field mismatch"
          assert sample["model"] == "paul-voice-v8"
          print("build_usage_event conforms to published MeshUsageEvent schema — contract green")
          PY
