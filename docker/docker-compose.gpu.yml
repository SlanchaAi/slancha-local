## NVIDIA GPU override — layer on top of the base compose:
##   docker compose -f docker/docker-compose.yml -f docker/docker-compose.gpu.yml up
##
## Requires the NVIDIA Container Toolkit on the host:
##   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html
## Verify with: docker run --rm --gpus all nvidia/cuda:12.4.0-base-ubuntu22.04 nvidia-smi
##
## Only Ollama needs the GPU; the proxy is CPU-only (onnx classifier ~10ms).

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
